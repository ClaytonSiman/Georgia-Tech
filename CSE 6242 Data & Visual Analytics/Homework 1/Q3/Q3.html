<!DOCTYPE html>
<!-- cse6242 -->

<!-- run: http-server & -->

<head>
  <style>    
  </style>
<title>Wildlife Trafficking Incidents per Species (2015 to 2023)</title>
</head>

<body>

  <script src="lib/d3/d3.min.js"></script>
  <script src="lib/d3-dsv/d3-dsv.min.js"></script>
  <script src="lib/d3-fetch/d3-fetch.min.js"></script>

  <script>
    // define the dimensions and margins for the graph
    var margin = ({top: 20, right: 30, bottom: 50, left: 40});
    var width = 900 - margin.left - margin.right;
    var height = 370 - margin.top - margin.bottom;

    // create scales x & y for X and Y axis and set their ranges
    var x = d3.scaleLinear()
      .range([margin.left, width]);
    var y = d3.scaleBand()
      .range([margin.top, height]);

    // append svg element to the body of the page
    var svg = d3.select("body").append("svg")
      .attr("id", "svg1")
	   	// set the id, dimensions and position of the svg element 	
      // .attr("viewBox", [0, 0, width + margin.left + margin.right, height + margin.top + margin.bottom])
      .attr("width", 900)
      .attr("height", 370)
	    .append("g")
	    .attr("id", "container");

    // Get the data and filter for top 5 most trafficked species
	  var pathToCsv = "q3.csv";		// path to csv
	
    d3.dsv(",", pathToCsv, function (d) {
      d.count = +d.count;
      return d;
    }).then(function (data) {
      console.log(data); // you should see the data in your browser's developer tools console 
      
      /* Create bar plot using data from csv */
      const top5Species = data
        .sort((a, b) => b.count - a.count)
        .slice(0, 5)
        // .sort((a, b) => a.count - b.count);

      const color = d3.scaleOrdinal(d3.schemeCategory10)
        .domain(top5Species.map(d => d.species));

      // set the domains of X and Y scales based on data
      x.domain([0, d3.max(top5Species, d => d.count)]);
      y
        .domain(top5Species.map(d => d.species))
        .padding(0.2);
        // .paddingInner(0.2)
        // .paddingOuter(0.5);

      // Add bars to svg - create new elements based on your data
      var bars = svg.append("g").attr("id", "bars")

      bars.selectAll("rect")
        .data(top5Species)
        .enter()
        .append("rect")
        // .attr("class", "bar")
        .attr("x", x(0))
        .attr("y", d => y(d.species))
        .attr("width", d => x(d.count) - x(0))
        .attr("height", y.bandwidth())
        .attr("fill", d => color(d.species))
        .attr("transform", `translate(${margin.left + 20},${margin.top})`);

      // Add the X Axis
      svg.append("g")
        .attr("id", "x_axis")
        //.attr("transform", `translate(0,${height - margin.bottom})`)
        .attr("transform", `translate(${margin.left + 20},${height + margin.top})`)
        .call(d3.axisBottom(x));

      // Add the text label for X Axis
      svg.append("text")
        .attr("id", "x_axis_label")
        .attr("x", width / 2) // Center the label horizontally
        .attr("y", height + margin.bottom - 5) // Position it below the x-axis
        .attr("text-anchor", "middle")
        .attr("transform", `translate(${margin.left},${margin.top})`)
        .text("Count");

      // Add the Y Axis
      svg.append("g")
        .attr("id", "y_axis")
        //.attr("transform", `translate(${margin.left + 40},0)`)
        .attr("transform", `translate(${margin.left + 60},${margin.top})`)
        .call(d3.axisLeft(y));

      // Add the text label for Y axis
      svg.append("text")
        .attr("id", "y_axis_label")
        .attr("transform", "rotate(-90)") // Rotate for vertical orientation
        .attr("y", 20) // Adjust position to be next to the y-axis
        .attr("x", -margin.top - (height / 2)) // Center it vertically on the axis
        .attr("text-anchor", "middle")
        .text("Species");

      // Add GT username
      svg.append("text")
        .attr("id", "credit")
        .attr("x", width) 
        .attr("y", height + margin.bottom - 5)
        .attr("text-anchor", "end") 
        .attr("transform", `translate(${margin.left},${margin.top})`)
        .text("csiman6");

      // Add Title
      svg.append("text")
        .attr("id", "title")
        .attr("x", width / 2) 
        .attr("y", margin.top)
        .attr("text-anchor", "middle") 
        .attr("transform", `translate(${margin.left},${margin.top})`)
        .text("Wildlife Trafficking Incidents per Species (2015 to 2023)");


    }).catch(function (error) {
      console.log(error);
    });

  </script>
</body>
