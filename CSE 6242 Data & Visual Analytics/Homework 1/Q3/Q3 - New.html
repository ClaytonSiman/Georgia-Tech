<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wildlife Trafficking Incidents per Species (2015 to 2023)</title>
  <script src="lib/d3/d3.min.js"></script>
  <script src="lib/d3-dsv/d3-dsv.min.js"></script>
  <script src="lib/d3-fetch/d3-fetch.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
    }
    .bar {
      stroke: #333;
    }
    #credit {
      font-size: 10px;
      text-anchor: end;
    }
    #title {
      font-size: 16px;
      font-weight: bold;
      text-anchor: middle;
    }
  </style>
</head>
<body>
  <svg id="chart" width="700" height="400"></svg>

  <script>
    var pathToCsv = "q3.csv";   // path to csv
  
    d3.dsv(",", pathToCsv, function (d) {
      d.count = +d.count;
      return d;
    }).then(function (data) {
      console.log(data); // you should see the data in your browser's developer tools console 

      // 1. Keep only top 5 by count
      const top5 = data.sort((a, b) => b.count - a.count).slice(0, 5);

      const margin = { top: 60, right: 40, bottom: 50, left: 120 };
      const width = 700 - margin.left - margin.right;
      const height = 400 - margin.top - margin.bottom;

      const svg = d3.select("#chart")
        .append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      // 2. Scales
      const x = d3.scaleLinear()
        .domain([0, d3.max(top5, d => d.count)])
        .range([0, width]);

      const y = d3.scaleBand()
        .domain(top5.map(d => d.species))
        .range([0, height])
        .padding(0.2); // ensures fixed thickness + space between bars

      // 3. Axes
      const xAxis = d3.axisBottom(x)
        .ticks(d3.max(top5, d => d.count) / 500) // ticks every 500
        .tickFormat(d3.format("d"));

      const yAxis = d3.axisLeft(y);

      svg.append("g")
        .attr("id", "x_axis")
        .attr("transform", `translate(0,${height})`)
        .call(xAxis);

      svg.append("g")
        .attr("id", "y_axis")
        .call(yAxis);

      // 4. Axis Labels
      svg.append("text")
        .attr("id", "x_axis_label")
        .attr("x", width / 2)
        .attr("y", height + 40)
        .attr("text-anchor", "middle")
        .text("Count");

      svg.append("text")
        .attr("id", "y_axis_label")
        .attr("x", -height / 2)
        .attr("y", -80)
        .attr("transform", "rotate(-90)")
        .attr("text-anchor", "middle")
        .text("Species");

      // 5. Bars
      const color = d3.scaleOrdinal(d3.schemeTableau10);

      svg.selectAll(".bar")
        .data(top5)
        .enter()
        .append("rect")
        .attr("class", "bar")
        .attr("y", d => y(d.species))
        .attr("x", 0)
        .attr("height", y.bandwidth())
        .attr("width", d => x(d.count))
        .attr("fill", (d, i) => color(i));

      // 6. Title
      svg.append("text")
        .attr("id", "title")
        .attr("x", width / 2)
        .attr("y", -20)
        .text("Wildlife Trafficking Incidents per Species (2015 to 2023)");

      // 7. Credit (GT username placeholder)
      svg.append("text")
        .attr("id", "credit")
        .attr("x", width)
        .attr("y", height + 45)
        .text("test");
  </script>
</body>
</html>
