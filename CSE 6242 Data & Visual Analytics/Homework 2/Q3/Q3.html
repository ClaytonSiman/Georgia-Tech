<!DOCTYPE html>

<head>
  <title>Line Charts</title>
  <meta charset="utf-8">

  <script type="text/javascript" src="../lib/d3.v5.min.js"></script>

</head>

<body>
  <div id='signature'>csiman6</div>
  <script>
    // define the dimensions and margins for the graph
    var margin = ({top: 20, right: 100, bottom: 50, left: 100});
    var width = 900 - margin.left - margin.right;
    var height = 370 - margin.top - margin.bottom;

    // create scales x & y for X and Y axis and set their ranges
    var x = d3.scaleTime()
      .range([0, width]);
    var y = d3.scaleLinear()
      .range([height, 0]);

    // append svg element to the body of the page
    var svg_a = d3.select("body").append("svg")
      .attr("id", "svg-a")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.top + margin.bottom)
      .append("g")
      .attr("id", "plot-a")
      .attr("transform", "translate(" + margin.left + "," + margin.top + ")");
    
    // Chart title
    svg_a.append("text")
      .attr("id", "title-a")
      .attr("x", width / 2)
      .attr("y", -margin.top + 15)
      .attr("text-anchor", "middle")
      .text("Number of Ratings 2016-2020");

    var svg_b = d3.select("body").append("svg")
      .attr("id", "svg-b")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.top + margin.bottom)
      .append("g")
      .attr("id", "plot-b")
      .attr("transform", "translate(" + margin.left + "," + margin.top + ")");
    
    svg_b.append("text")
      .attr("id", "title-b")
      .attr("x", width / 2)
      .attr("y", -margin.top + 15)
      .attr("text-anchor", "middle")
      .text("Number of Ratings 2016–2020 with Rankings");

    var svg_c1 = d3.select("body").append("svg")
      .attr("id", "svg-c-1")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.top + margin.bottom)
      .append("g")
      .attr("id", "plot-c-1")
      .attr("transform", "translate(" + margin.left + "," + margin.top + ")");
    
    svg_c1.append("text")
      .attr("id", "title-c-1")
      .attr("x", width / 2)
      .attr("y", -margin.top + 15)
      .attr("text-anchor", "middle")
      .text("Number of Ratings 2016–2020 (Square root Scale)");

    var svg_c2 = d3.select("body").append("svg")
      .attr("id", "svg-c-2")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.top + margin.bottom)
      .append("g")
      .attr("id", "plot-c-2")
      .attr("transform", "translate(" + margin.left + "," + margin.top + ")");
    
    svg_c2.append("text")
      .attr("id", "title-c-2")
      .attr("x", width / 2)
      .attr("y", -margin.top + 15)
      .attr("text-anchor", "middle")
      .text("Number of Ratings 2016–2020 (Log Scale)");


    d3.dsv(",", "boardgame_ratings.csv", function (d) {
      return {
        date: d3.timeParse("%Y-%m-%d")(d.date),
        catan_count: +d['Catan=count'],
        catan_rank: +d['Catan=rank'],
        dominion_count: +d['Dominion=count'],
        dominion_rank: +d['Dominion=rank'],
        codenames_count: +d['Codenames=count'],
        codenames_rank: +d['Codenames=rank'],
        terraforming_mars_count: +d['Terraforming Mars=count'],
        terraforming_mars_rank: +d['Terraforming Mars=rank'],
        gloomhaven_count: +d['Gloomhaven=count'],
        gloomhaven_rank: +d['Gloomhaven=rank'],
        mtg_count: +d['Magic: The Gathering=count'],
        mtg_rank: +d['Magic: The Gathering=rank'],
        dixit_count: +d['Dixit=count'],
        dixit_rank: +d['Dixit=rank'],
        monopoly_count: +d['Monopoly=count'],
        monopoly_rank: +d['Monopoly=rank']
      };
    }).then(function (data) {

      // Chart A: Ratings
      // Define the keys for the count data
      const keysA = ["catan_count", "codenames_count", "terraforming_mars_count", "gloomhaven_count", "dominion_count", "mtg_count", "dixit_count", "monopoly_count"];
      
      // Transform the data into an array of objects
      const seriesA = keysA.map(key => {
        return {
          name: key.replace('_count', '').replace(/_/g, ' ').replace('mtg', 'Magic: The Gathering'),
          values: data.map(d => ({date: d.date, value: d[key]}))
        };
      });

      // Set the domains for the scales
      x.domain(d3.extent(data, d => d.date));
      y.domain([0, d3.max(seriesA, s => d3.max(s.values, d => d.value))]);

      // Add the X axis
      const x_axis_a = svg_a.append("g")
          .attr("transform", `translate(0,${height})`)
          .attr("id", "x-axis-a")
          .style("font-size", "10px")
          .call(d3.axisBottom(x)
              .ticks(d3.timeMonth.every(3)));

      const y_axis_a = svg_a.append("g")
          .attr("id", "y-axis-a")
          .style("font-size", "10px")
          .call(d3.axisLeft(y).ticks(d3.tickStep(0, 90000, 10000)));

      x_axis_a.selectAll(".tick text")
          .attr("y", 15) // Adjust the vertical position of the text group
          .text(null) // Remove the default text
          .append("tspan")
          .attr("x", 0) // Position the first line
          .attr("dy", "0.7em") // Adjust vertical spacing
          .text(d => d3.timeFormat("%b %y")(d));

      // x_axis_a.append("g")
      //     .attr("transform", `translate(0,${height})`)
      //     .style("font-size", "10px")
      //     .call(d3.axisBottom(x)
      //         .ticks(d3.timeMonth.every(3))
      //         .tickFormat(d3.timeFormat("%b %y")));

      // Add the Y axis
      // y_axis_a.append("g")
      //     .style("font-size", "10px")
      //     .call(d3.axisLeft(y).ticks(d3.tickStep(0, 90000, 10000)));
     
      y_axis_a.selectAll(".tick text")
          .each(function(d) {
              // const parts = d3.format(",")(d).split(","); // Split the number at the comma
              d3.select(this)
                  .text(null) // Remove the default text
                  .append("tspan")
                  .attr("x", -10) // Position the first part
                  .attr("dy", "0.3em") // Adjust vertical spacing
                  .text(d);
          });

      // Add the X axis label
      x_axis_a.append("text")
          .attr("x", width / 2)
          .attr("y", height + margin.bottom - 10)
          .attr("text-anchor", "middle")
          .style("font-size", "12px")
          .text("Month");

      // Add the Y axis label
      y_axis_a.append("text")
          .attr("transform", "rotate(-90)")
          .attr("y", -margin.left + 10)
          .attr("x", -height / 2)
          .attr("dy", "1em")
          .attr("text-anchor", "middle")
          .style("font-size", "12px")
          .text("Num of Ratings");

      // Define a color scale
      var zA = d3.scaleOrdinal(d3.schemeCategory10);
      zA.domain(keysA);

      // Define the line generator
      const lineA = d3.line()
          .x(d => x(d.date))
          .y(d => y(d.value));

      const lineGroupA = svg_a.append("g")
          .attr("id", "lines-a");

      // Draw the lines inside the group
      lineGroupA.selectAll("path")
          .data(seriesA)
          .enter().append("path")
          .attr("class", "line")
          .attr("d", d => lineA(d.values))
          .style("fill", "none")
          .style("stroke-width", "2px")
          .style("stroke", d => zA(d.name.replace(/ /g, '_') + '_count'));

      // Add the labels inside the group
      lineGroupA.selectAll("text")
          .data(seriesA)
          .enter().append("text")
          .datum(d => ({name: d.name, value: d.values[d.values.length - 1]}))
          .attr("transform", d => `translate(${x(d.value.date)},${y(d.value.value)})`)
          .attr("x", 5)
          .attr("dy", "0.35em")
          .style("font-size", "10px")
          .attr("class", "label")
          .style("fill", d => zA(d.name.replace(/ /g, '_') + '_count'))
          .text(d => d.name);

      // Chart B: Ratings with Rankings
      const keysB = ["catan_count", "codenames_count", "terraforming_mars_count", "gloomhaven_count"];
      const rankKeysB = ["catan_rank", "codenames_rank", "terraforming_mars_rank", "gloomhaven_rank"];
      
      const seriesB = keysB.map(key => {
        return {
          name: key.replace('_count', '').replace(/_/g, ' '),
          values: data.map(d => ({date: d.date, value: d[key]})).filter(d => d.value != null && !isNaN(d.value))
        };
      });
      const rankSeriesB = rankKeysB.map(key => {
        return {
          name: key.replace('_rank', '').replace(/_/g, ' '),
          values: data.map(d => ({date: d.date, value: d[key], count: d[key.replace('_rank', '_count')]})).filter(d => d.value != null && !isNaN(d.value) && d.count != null && !isNaN(d.count))
        };
      });

      // Define the line generator
      const lineB = d3.line()
          .x(d => x(d.date))
          .y(d => y(d.value));

      var zB = d3.scaleOrdinal(d3.schemeCategory10);
      zB.domain(keysB);

      // Draw the lines
      const lineGroupB = svg_b.append("g")
          .attr("id", "lines-b");

      // Draw the lines inside the group
      lineGroupB.selectAll("path")
          .data(seriesA)
          .enter().append("path")
          .attr("class", "line")
          .attr("d", d => lineB(d.values))
          .style("fill", "none")
          .style("stroke-width", "2px")
          .style("stroke", d => zA(d.name.replace(/ /g, '_') + '_count'));

      // Add the labels inside the group
      lineGroupB.selectAll("text")
          .data(seriesA)
          .enter().append("text")
          .datum(d => ({name: d.name, value: d.values[d.values.length - 1]}))
          .attr("transform", d => `translate(${x(d.value.date)},${y(d.value.value)})`)
          .attr("x", 15)
          .attr("dy", "0.35em")
          .style("font-size", "10px")
          .attr("class", "label")
          .style("fill", d => zA(d.name.replace(/ /g, '_') + '_count'))
          .text(d => d.name);

      // Add axes and labels for the second chart
      const x_axis_b = svg_b.append("g")
          .attr("id", "x-axis-b")
          .attr("transform", `translate(0,${height})`)
          .style("font-size", "10px")
          .call(d3.axisBottom(x)
              .ticks(d3.timeMonth.every(3)));

      const y_axis_b = svg_b.append("g")
          .attr("id", "y-axis-b")
          .style("font-size", "10px")
          .call(d3.axisLeft(y).ticks(d3.tickStep(0, 90000, 10000)));

      x_axis_b.selectAll(".tick text")
          .attr("y", 15) // Adjust the vertical position of the text group
          .text(null) // Remove the default text
          .append("tspan")
          .attr("x", 0) // Position the first line
          .attr("dy", "0.7em") // Adjust vertical spacing
          .text(d => d3.timeFormat("%b %y")(d));
     
      y_axis_b.selectAll(".tick text")
          .each(function(d) {
              // const parts = d3.format(",")(d).split(","); // Split the number at the comma
              d3.select(this)
                  .text(null) // Remove the default text
                  .append("tspan")
                  .attr("x", -10) // Position the first part
                  .attr("dy", "0.3em") // Adjust vertical spacing
                  .text(d);
          });

      x_axis_b.append("text")
          .attr("x", width / 2)
          .attr("y", height + margin.bottom - 10)
          .attr("text-anchor", "middle")
          .style("font-size", "12px")
          .text("Month");

      y_axis_b.append("text")
          .attr("transform", "rotate(-90)")
          .attr("y", -margin.left + 10)
          .attr("x", -height / 2)
          .attr("dy", "1em")
          .attr("text-anchor", "middle")
          .style("font-size", "12px")
          .text("Num of Ratings");

      // Add lines with circle markers
      // Add circle markers with ranking text
      const symbolGroup = svg_b.append("g")
          .attr("id", "symbols-b");

      // rankSeriesB.forEach(s => {
      //   const markers = s.values.filter((d, i) => i % 3 === 0);
      const tickDates = x.ticks(d3.timeMonth.every(3));

      // Add circle markers with ranking text
      rankSeriesB.forEach(s => {
        // Filter the series to only include data points that match a tick date
        const markers = s.values.filter(d => {
          // Check if the date of the data point is present in the tickDates array
          return tickDates.some(tickDate => tickDate.getTime() === d.date.getTime());
        });

        symbolGroup.selectAll(null)
          .data(markers)
          .enter()
          .append("circle")
          .attr("r", 10)
          .attr("cx", d => x(d.date))
          .attr("cy", d => y(d.count))
          .style("fill", zB(s.name.replace(/ /g, '_') + '_count'))
          .style("stroke", "white")
          .style("stroke-width", "1.5px");

        symbolGroup.selectAll(null)
          .data(markers)
          .enter()
          .append("text")
          .attr("x", d => x(d.date))
          .attr("y", d => y(d.count))
          .attr("dy", "0.35em")
          .attr("text-anchor", "middle")
          .style("fill", "white")
          .style("font-size", "7px")
          .style("font-weight", "bold")
          .text(d => d.value);
      });

      const legend = svg_b.append("g")
          .attr("id", "legend-b")

      legend.append("text")
          .attr("transform", `translate(${width + 10}, ${height})`)
          .text("Ranking Marker")
          .style("font-size", "10px")
          
      legend.append("circle")
          .attr("transform", `translate(${width + 45}, ${height-25})`)
          .attr("r", 10)
          .style("fill", "black"); // You can use any color that contrasts well

      // Part 3: Square Root and Log Scales
      const y_sqrt = d3.scaleSqrt().range([height, 0]);
      y_sqrt.domain([0, d3.max(seriesB, s => d3.max(s.values, d => d.value))]);

      const y_log = d3.scaleLog().range([height, 0]);
      y_log.domain([1, d3.max(seriesB, s => d3.max(s.values, d => d.value))]); // Min domain is 1 to handle 0s

      const lineC1 = d3.line()
          .x(d => x(d.date))
          .y(d => y_sqrt(d.value));

      const lineC2 = d3.line()
          .x(d => x(d.date))
          .y(d => y_log(d.value));

      // Chart C1 (Square Root)
      const lineGroupC1 = svg_c1.append("g")
          .attr("id", "lines-c-1")
          .attr("class", "line-group-c1");

      lineGroupC1.selectAll(".line")
          .data(seriesA)
          .enter().append("path")
          .attr("class", "line")
          .attr("d", d => lineC1(d.values))
          .style("fill", "none")
          .style("stroke-width", "2px")
          .style("stroke", d => zA(d.name.replace(/ /g, '_') + '_count'));

      lineGroupC1.selectAll(".label")
          .data(seriesA)
          .enter().append("text")
          .datum(d => ({name: d.name, value: d.values[d.values.length - 1]}))
          .attr("transform", d => `translate(${x(d.value.date)},${y_sqrt(d.value.value)})`)
          .attr("x", 5)
          .attr("dy", "0.35em")
          .style("font-size", "10px")
          .attr("class", "label")
          .style("fill", d => zA(d.name.replace(/ /g, '_') + '_count'))
          .text(d => d.name);

      const symbolGroupC1 = svg_c1.append("g")
          .attr("id", "symbols-c-1");

      rankSeriesB.forEach(s => {
        const markers = s.values.filter(d => tickDates.some(tickDate => tickDate.getTime() === d.date.getTime()));
        const markerGroup = symbolGroupC1.selectAll(null).data(markers).enter().append("g");
        
        markerGroup.append("circle")
          .attr("r", 10)
          .attr("cx", d => x(d.date))
          .attr("cy", d => y_sqrt(d.count))
          .style("fill", zB(s.name.replace(/ /g, '_') + '_count'))
          .style("stroke", "white")
          .style("stroke-width", "1.5px");

        markerGroup.append("text")
          .attr("x", d => x(d.date))
          .attr("y", d => y_sqrt(d.count))
          .attr("dy", "0.35em")
          .attr("text-anchor", "middle")
          .style("fill", "white")
          .style("font-size", "7px")
          .style("font-weight", "bold")
          .text(d => d.value);
      });

      // Chart C2 (Log)
      const lineGroupC2 = svg_c2.append("g")
          .attr("id", "lines-c-2")
          .attr("class", "line-group-c2");

      lineGroupC2.selectAll(".line")
          .data(seriesA)
          .enter().append("path")
          .attr("class", "line")
          .attr("d", d => lineC2(d.values))
          .style("fill", "none")
          .style("stroke-width", "2px")
          .style("stroke", d => zA(d.name.replace(/ /g, '_') + '_count'));

      lineGroupC2.selectAll(".label")
          .data(seriesA)
          .enter().append("text")
          .datum(d => ({name: d.name, value: d.values[d.values.length - 1]}))
          .attr("transform", d => `translate(${x(d.value.date)},${y_log(d.value.value)})`)
          .attr("x", 5)
          .attr("dy", "0.35em")
          .style("font-size", "10px")
          .attr("class", "label")
          .style("fill", d => zA(d.name.replace(/ /g, '_') + '_count'))
          .text(d => d.name);

      const symbolGroupC2 = svg_c2.append("g")
          .attr("id", "symbols-c-2");

      rankSeriesB.forEach(s => {
        const markers = s.values.filter(d => tickDates.some(tickDate => tickDate.getTime() === d.date.getTime()));
        const markerGroup = symbolGroupC2.selectAll(null).data(markers).enter().append("g");
        
        markerGroup.append("circle")
          .attr("r", 10)
          .attr("cx", d => x(d.date))
          .attr("cy", d => y_log(d.count))
          .style("fill", zB(s.name.replace(/ /g, '_') + '_count'))
          .style("stroke", "white")
          .style("stroke-width", "1.5px");

        markerGroup.append("text")
          .attr("x", d => x(d.date))
          .attr("y", d => y_log(d.count))
          .attr("dy", "0.35em")
          .attr("text-anchor", "middle")
          .style("fill", "white")
          .style("font-size", "7px")
          .style("font-weight", "bold")
          .text(d => d.value);
      });

      // Common Axes and Labels
      // Add axes and labels for the charts
      const x_axis_c1 = svg_c1.append("g")
          .attr("id", "x-axis-c-1")
          .attr("transform", `translate(0,${height})`)
          .style("font-size", "10px")
          .call(d3.axisBottom(x)
              .ticks(d3.timeMonth.every(3)));

      const y_axis_c1 = svg_c1.append("g")
          .attr("id", "y-axis-c-1")
          .style("font-size", "10px")
          .call(d3.axisLeft(y).ticks(d3.tickStep(0, 90000, 10000)));
          1.0, 2.0, 10.0, 20.0, 100.0, 200.0, 1000.0, 2000.0, 10000.0, 20000.0

      x_axis_c1.selectAll(".tick text")
          .attr("y", 15) // Adjust the vertical position of the text group
          .text(null) // Remove the default text
          .append("tspan")
          .attr("x", 0) // Position the first line
          .attr("dy", "0.7em") // Adjust vertical spacing
          .text(d => d3.timeFormat("%b %y")(d));
     
      y_axis_c1.selectAll(".tick text")
          .each(function(d) {
              // const parts = d3.format(",")(d).split(","); // Split the number at the comma
              d3.select(this)
                  .text(null) // Remove the default text
                  .append("tspan")
                  .attr("x", -10) // Position the first part
                  .attr("dy", "0.3em") // Adjust vertical spacing
                  .text(d);
          });

      const x_axis_c2 = svg_c2.append("g")
          .attr("id", "x-axis-c-2")
          .attr("transform", `translate(0,${height})`)
          .style("font-size", "10px")
          .call(d3.axisBottom(x)
              .ticks(d3.timeMonth.every(3)));

      const y_axis_c2 = svg_c2.append("g")
          .attr("id", "y-axis-c-2")
          .style("font-size", "10px")
          .call(d3.axisLeft(y_log).tickValues([1.0, 2.0, 10.0, 20.0, 100.0, 200.0, 1000.0, 2000.0, 10000.0, 20000.0]));
          

      x_axis_c2.selectAll(".tick text")
          .attr("y", 15) // Adjust the vertical position of the text group
          .text(null) // Remove the default text
          .append("tspan")
          .attr("x", 0) // Position the first line
          .attr("dy", "0.7em") // Adjust vertical spacing
          .text(d => d3.timeFormat("%b %y")(d));
     
      y_axis_c2.selectAll(".tick text")
          .each(function(d) {
              // const parts = d3.format(",")(d).split(","); // Split the number at the comma
              d3.select(this)
                  .text(null) // Remove the default text
                  .append("tspan")
                  .attr("x", -10) // Position the first part
                  .attr("dy", "0.3em") // Adjust vertical spacing
                  .text(d);
          });

      const legend_c1 = svg_c1.append("g")
          .attr("id", "legend-c-1")

      legend_c1.append("circle")
          .attr("cx", 0)
          .attr("cy", 0)
          .attr("r", 10)
          .attr("transform", `translate(${width + 45}, ${height-25})`)
          .style("fill", "black");

      legend_c1.append("text")
          .attr("x", 0)
          .attr("y", 0)
          // .attr("dy", "0.35em")
          .attr("transform", `translate(${width + 10}, ${height})`)
          .style("font-size", "10px")
          .text("Ranking Marker");

      const legend_c2 = svg_c2.append("g")
          .attr("id", "legend-c-2")

      legend_c2.append("circle")
          .attr("cx", 0)
          .attr("cy", 0)
          .attr("r", 10)
          .attr("transform", `translate(${width + 45}, ${height-25})`)
          .style("fill", "black");

      legend_c2.append("text")
          .attr("x", 0)
          .attr("y", 0)
          // .attr("dy", "0.35em")
          .attr("transform", `translate(${width + 10}, ${height})`)
          .style("font-size", "10px")
          .text("Ranking Marker");

      svg_c2.append("text")
        .attr("id", "credit")
        .attr("x", width - 20) 
        .attr("y", height)
        .attr("text-anchor", "end") 
        .attr("transform", `translate(${margin.left},${margin.top})`)
        .text("csiman6");
    }).catch(function(error) {
      console.log(error);
    });
  </script>
</body>
